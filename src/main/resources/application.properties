spring.application.name=backend_web

# ===== SERVER =====
server.port=8080
server.forward-headers-strategy=native

# ===== DATABASE PostgreSQL =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mocphim}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:050623}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== CACHE — Redis =====
spring.cache.type=redis

redis.host=${REDIS_HOST:redis-16697.c54.ap-northeast-1-2.ec2.cloud.redislabs.com}
redis.port=${REDIS_PORT:16697}
