spring.application.name=backend_web

# ===== SERVER =====
server.port=8080

# ===== DATABASE PostgreSQL =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== CACHE — Redis Cloud (Jedis) =====
spring.cache.type=redis

redis.host=redis-16697.c54.ap-northeast-1-2.ec2.cloud.redislabs.com
redis.port=16697
redis.user=default
redis.password=Sx5KwQ5RzXhE98k4tY2gujLEfYGoojEg
redis.timeout-ms=2000

# ===== OPHIM UPSTREAM =====
ophim.base-url=https://ophim1.com/v1/api
ophim.timeout-ms=10000

# ===== SCHEDULER =====
scheduler.movie-sync.enabled=true
scheduler.movie-sync.cron=0 * * * * *

# ===== CORS =====
cors.allowed-origins=http://localhost:3000,https://mocphim.vn

# ===== LOGGING =====
logging.level.mocphim.com.backend_web=DEBUG
