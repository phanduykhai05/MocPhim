# ===== JWT =====
app.jwt.secret=${JWT_SECRET:mocphim-default-secret-key-please-change-in-production-min-256-bits}
app.jwt.access-expiration=1800000
app.jwt.refresh-expiration=604800000

# ===== OAUTH2 =====
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback/google}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# ===== OPHIM UPSTREAM =====
